<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laiane & Leonardo</title>

  <meta property="og:title" content="Laiane & Leonardo | Convite de Casamento">

<meta property="og:description" content="Com alegria, compartilhamos com vocês o nosso convite de casamento. Clique no envelope para abrir. 💍✨">

<meta property="og:image" content="https://casamento-laiane-e-leonardo.github.io/casamento-laiane-e-leonardo/envelope.png">

<meta property="og:url" content="https://casamento-laiane-e-leonardo.github.io/casamento-laiane-e-leonardo/">

<meta property="og:type" content="website">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#f5f2ec;
font-family:Georgia, serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
flex-direction:column;
overflow:auto;

}


#envelope{

width:340px;
cursor:pointer;
animation:flutuar 3s infinite ease-in-out;
transition:.8s;

}


@keyframes flutuar{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

}



#convite{

display:none;
width:100%;
height:85vh;
object-fit:contain;
box-shadow:0 15px 40px rgba(0,0,0,.35);
border-radius:10px;

}



.fade{

animation:abrir 1.2s ease;

}



@keyframes abrir{

from{

opacity:0;
transform:scale(.85);

}

to{

opacity:1;
transform:scale(1);

}

}



.botao{

display:none;
margin-top:20px;
background:#0b4f3a;
color:white;
text-decoration:none;
padding:11px 24px;
border-radius:30px;
font-size:15px;
transition:.3s;

}


.botao:hover{

transform:scale(1.05);

}


</style>

</head>


<body>


<img
id="envelope"
src="envelope.png"
onclick="abrirConvite()">



<img
id="convite"
src="convite.png">



<a 
class="botao"
id="botaoLocal"
target="_blank"
href="https://www.google.com/maps/place/Paroquia+Menino+Jesus+de+Praga+e+Santa+Ifigenia+-+Diocese+de+Franca/@-20.5457374,-47.4143597,17z/data=!3m1!4b1!4m6!3m5!1s0x94b0a7d37daad993:0x33c5d339c62cd8d0!8m2!3d-20.5457374!4d-47.4117848"
📍 Local da cerimônia

</a>



<script>


function abrirConvite(){


document.getElementById("envelope").style.display="none";


let convite=document.getElementById("convite");

convite.style.display="block";

convite.classList.add("fade");


document.getElementById("botaoLocal").style.display="block";


}


</script>


</body>

</html>
